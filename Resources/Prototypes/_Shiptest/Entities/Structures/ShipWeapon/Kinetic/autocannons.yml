- type: entity
  id: WeaponShuttleKineticAutoCannonT1
  name: 57мм авто-пушка BFA-13 «Скат»
  parent: MagFedBallisticArtillery
  description: "Бюджетная корабельная авто-пушка. Имеет меньшую скоростельность, чем у пулеметов, но при этом имеет большую точность и пробитие. Эффективно пробивает вражеский корпус на средних дистанциях."
  components:
  - type: StaticPrice
    price: 1800
  - type: Sprite
    sprite: _Mono/Objects/ShuttleWeapons/dravon.rsi
    layers:
    - state: space_artillery
  - type: Battery
    maxCharge: 4000
    startingCharge: 4000
  - type: ExaminableBattery
  - type: Appearance
  - type: AmmoCounter
  - type: AutoShootGun
  - type: GunSignalControl
  - type: WirelessNetworkConnection
    range: 600
  - type: DeviceLinkSink
    ports:
    - SpaceArtilleryFire
    - Toggle
  - type: Gun
    fireRate: 2.75
    projectileSpeed: 88.17
    minAngle: 2.2
    maxAngle: 7
    angleIncrease: 0.55
    angleDecay: 4
    currentAngle: 2.3
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/Gunshots/mortar.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 3
  - type: SpaceArtillery
    powerChargeRate: 350
    powerUsePassive: 280
  - type: Actions
  - type: MagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        startingItem: MagazineShip57mm
        priority: 1
        whitelist:
          tags:
          - MagazineShip57mm
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
  - type: RadarBlip
    radarColor: "#FFAA44"
    scale: 1.2
  - type: ShipGunType
    shipType: Ballistic
  - type: ShipGunClass
    shipClass: Medium

