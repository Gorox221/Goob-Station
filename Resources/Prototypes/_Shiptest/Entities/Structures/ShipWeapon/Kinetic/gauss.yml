- type: entity
  id: WeaponShuttleKineticGaussT1
  name: гаусс-артиллерия FG-13 «Лоренц-Форс»
  parent: BallisticArtillery
  description: "Электромагнитный ускоритель масс, разгоняющий снаряд при помощи катушек. Ферромагнитный снаряд пробивает даже пластитановую броню, но крайне плох против энергетических щитов. Низкий темп стрельбы взамен на высокую точность. С дистанцией урон увеличивается."
  components:
  - type: StaticPrice
    price: 10000
  - type: Sprite
    sprite: _Mono/Objects/ShuttleWeapons/charon.rsi
    layers:
    - state: space_artillery
  - type: Battery
    maxCharge: 8000
    startingCharge: 8000
  - type: ExaminableBattery
  - type: Appearance
  - type: AmmoCounter
  - type: AutoShootGun
  - type: GunSignalControl
  - type: WirelessNetworkConnection
    range: 600
  - type: DeviceLinkSink
    ports:
    - SpaceArtilleryFire
    - Toggle
  - type: Gun
    fireRate: 0.05
    projectileSpeed: 212.33
    minAngle: 0.35
    maxAngle: 1.1
    angleIncrease: 0.05
    angleDecay: 2
    currentAngle: 0.4
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/Gunshots/leviathan_fire.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/EmptyAlarm/smg_empty_alarm.ogg
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 4
  - type: SpaceArtillery
    powerChargeRate: 300
    powerUsePassive: 500
  - type: Actions
  - type: BallisticAmmoProvider
    proto: CartridgeShipGaussBolt
    capacity: 1
    mayTransfer: true
    whitelist:
      tags:
      - CartridgeShipGaussBolt
  - type: RadarBlip
    radarColor: "#19AFFF"
    scale: 1.4
  - type: ShipGunType
    shipType: Ballistic
  - type: ShipGunClass
    shipClass: Medium

