- type: entity
  id: ShieldEmitterBase
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  abstract: true
  name: deflector shield emitter
  description: Energy shield projector. Place on a grid to generate a deflector when powered.
  components:
  - type: WiresPanel
  - type: WiresVisuals
  - type: Sprite
    noRot: true
    sprite: Structures/Machines/server.rsi
    layers:
    - state: server
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 200

- type: entity
  id: ShieldEmitterSmall
  parent: ShieldEmitterBase
  name: генератор энергетического щита первого уровня
  description: Устройство на основе квантовых резонаторов проецирует стоячую электромагнитную волну, ионизирующую локальный вакуум. Поле отклоняет заряженные частицы и рассеивает лазерные лучи за счёт эффекта томсоновского рассеяния.
  suffix: T1
  components:
  - type: Machine
    board: ShieldEmitterT1MachineCircuitboard
  - type: ApcPowerReceiver
    powerLoad: 20000
  - type: ShipShieldEmitter
    damageLimit: 1000
    healPerSecond: 20
    damageExp: 1.0
    powerDraw: 20000
    unpoweredBonus: 2.5
    damageOverloadTimePunishment: 60
    shieldTexture: /Textures/_Crescent/ShipShields/shieldblue.png

