# Space biome prototypes for CorvaxGoob
# Biomes define parallax presets, display names, transition durations, and map colors.
# Entities with SpaceBiomeSourceComponent reference these biome IDs.

# Default deep space biome (no map color — invisible on console)
- type: spaceFactionBiome
  id: DefaultSpace
  parallax: Default
  researchPoints: 100
  name: "Глубокий Космос"
  description: "Бескрайняя пустота между звёзд"
  swapDuration: 3
  mapColor: "#00000000"
  spawns: []

# Asteroid belt biome — amber/orange
- type: spaceFactionBiome
  id: AsteroidBelt
  parallax: TrainStation
  researchPoints: 2000
  name: "Пояс Астероидов"
  description: "Каменные глыбы дрейфуют в тишине"
  swapDuration: 2
  mapColor: "#CC8833"
  spawns: []
  meteorStorm:
    enabled: true
    intervalMin: 5
    intervalMax: 20
    playerActivationRange: 100
    minMeteorsPerWave: 1
    maxMeteorsPerWave: 6
    meteorPrototypes:
      - MeteorSmall
      - MeteorMedium
      - MeteorLarge
    meteorVelocity: 12
    spawnRingPadding: 80
    playerVisibilityRadius: 45

# Electric storm biome — dim gray
- type: spaceFactionBiome
  id: ElectricStorm
  parallax: Default
  researchPoints: 3000
  name: "Электрический шторм"
  description: "Вызывает удары, подобные Тесле, в случайных частях вашего корабля. "
  swapDuration: 2
  mapColor: "#fdf907"
  spawns: []
  lightningStorm:
    enabled: true
    intervalMin: 5
    intervalMax: 10
    playerActivationRange: 250
    arcRangeOnGrid: 14
    minBolts: 3
    maxBolts: 12
    arcDepth: 1
    lightningPrototype: Lightning

# Nebula space biome — eerie purple (blocks shuttle console scanning)
- type: spaceFactionBiome
  id: NebulaSpace
  parallax: KettleStation
  researchPoints: 1000
  name: "Туманность"
  description: "Плотные облака газа и пыли блокируют сенсоры"
  swapDuration: 4
  mapColor: "#9944CC"
  spawns: []
  blocksScanning: true

# Ion storm / Carp biome — blue-green electrical storms
- type: spaceFactionBiome
  id: IonStorm
  parallax: Default
  researchPoints: 1250
  name: "Ионный Шторм"
  description: "Заряженные частицы бушуют в этом секторе"
  swapDuration: 2
  mapColor: "#00CCAA"
  spawns: []
  empStorm:
    enabled: true
    intervalMin: 6
    intervalMax: 12
    playerActivationRange: 250
    minPulses: 1
    maxPulses: 2
    pulseRadius: 8
    energyConsumption: 30000
    disableDuration: 12

---
# Entity prototypes for biome sources
# These are spawned by SpaceBiomeSpawnerSystem with randomized positions and sizes.
# SwapDistance and Priority are overridden at spawn time.

- type: entity
  id: SpaceBiomeSourceDefault
  name: space biome source
  components:
    - type: SpaceBiomeSource
      biome: DefaultSpace
      swapDistance: 400
      priority: 0

- type: entity
  id: SpaceBiomeSourceAsteroidBelt
  name: asteroid belt biome source
  components:
    - type: SpaceBiomeSource
      biome: AsteroidBelt
      swapDistance: 400
      priority: 0

- type: entity
  id: SpaceBiomeSourceElectricStorm
  name: electric storm biome source
  components:
    - type: SpaceBiomeSource
      biome: ElectricStorm
      swapDistance: 400
      priority: 0

- type: entity
  id: SpaceBiomeSourceIonStorm
  name: ion storm biome source
  components:
    - type: SpaceBiomeSource
      biome: IonStorm
      swapDistance: 400
      priority: 0

- type: entity
  id: SpaceBiomeSourceNebulaSpace
  name: nebula biome source
  components:
    - type: SpaceBiomeSource
      biome: NebulaSpace
      swapDistance: 400
      priority: 0

# 
# 
# 

- type: entity
  id: InvisibleTesla
  name: invisible tesla
  description: An invisible source of lightning. Visible in the spawn menu.
  components:
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: LightningArcShooter
    arcDepth: 2
    maxLightningArc: 8
    shootMinInterval: 10
    shootMaxInterval: 15
    shootRange: 60
    lightningPrototype: Lightning
  - type: TimedDespawn
    lifetime: 40